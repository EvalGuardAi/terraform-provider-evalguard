name: CI

# Build, test, lint, and security-scan the provider on every change. This is the
# published mirror of EvalGuardAi/evalguard//packages/terraform-provider, so the
# whole repo IS the provider — no path filters or working-directory prefix.
on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-test:
    name: Build + test (race, coverage)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - name: gofmt (must be clean)
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "::error::gofmt needed on:"; echo "$unformatted"; exit 1
          fi
      - name: go vet
        run: go vet ./...
      - name: go mod tidy is committed
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum \
            || { echo "::error::go.mod/go.sum not tidy — run 'go mod tidy' and commit"; exit 1; }
      - name: go mod verify
        run: go mod verify
      - name: build
        run: go build ./...
      - name: test (race + coverage)
        run: go test -race -covermode=atomic -coverprofile=coverage.out ./...
      - name: coverage summary
        run: go tool cover -func=coverage.out | tail -1

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      # `go install` (not the golangci-lint-action) so the linter is built with
      # this job's Go toolchain. The action ships a prebuilt binary that lags Go
      # releases and refuses a module whose go directive is newer than the
      # binary's build version.
      - name: install + run golangci-lint
        run: |
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest
          "$(go env GOPATH)/bin/golangci-lint" run ./...

  security:
    name: Security (gosec + govulncheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - name: gosec (static security analysis)
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          gosec -severity medium -confidence medium ./...
      - name: govulncheck (known-vuln dependencies)
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  terraform-validate:
    name: terraform fmt + validate (examples)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false
      - name: terraform fmt (examples)
        run: terraform fmt -check -recursive examples
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - name: terraform validate (self-contained configs)
        # Validate HCL + provider-schema references without a real apply, using a
        # dev_overrides block so terraform resolves the local provider build
        # (the registry copy isn't published yet). Only the self-contained
        # configs are validated — examples/resources/** and data-sources/** are
        # registry doc snippets (fmt-checked above) that share a project and omit
        # the provider block, so they don't validate standalone by design.
        run: |
          go build -o /tmp/tfbin/terraform-provider-evalguard .
          cat > ~/.terraformrc <<EOF
          provider_installation {
            dev_overrides { "registry.terraform.io/EvalGuardAi/evalguard" = "/tmp/tfbin" }
            direct {}
          }
          EOF
          for d in examples/provider examples/complete; do
            echo "── validate $d ──"
            ( cd "$d" && terraform validate )
          done
